<!DOCTYPE html>
<html>

<head>
    <title>Configuration</title>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="classless.css">
</head>

<body>
    <p style="text-align:left"><a href="/">/home</a></p>
    <form action="/config" method="post" id="config">
        <fieldset>
            <legend>Radio/LoRa configuration</legend>
            <div class="row">
                <label class="col">Frequency (MHz)
                    <input type="number" step="0.001" name="lora_freq" required>
                </label>
                <label class="col">Bandwidth (kHz)
                    <input type="number" step="0.1" name="lora_bw" min="0" required>
                </label>
                <label class="col">Spreading Factor
                    <input type="number" name="lora_sf" min="6" max="12" required>
                </label>
                <label class="col">Coding Rate (4/x)
                    <input type="number" name="lora_cr" min="5" max="8" required>
                </label>
                <label class="col">Sync-word
                    <input type="text" name="lora_sync" required>
                </label>
            </div>
        </fieldset>
        <fieldset>
            <legend>MQTT configuration</legend>
            <div class="row">
                <label class="col">Broker host (leave empty to disable)
                    <input type="text" name="mqtt_broker_host">
                </label>
                <label class="col-3">port
                    <input type="number" name="mqtt_broker_port" min="0" required>
                </label>
            </div>
            <div class="row">
                <label class="col">Client user name
                    <input type="text" name="mqtt_user">
                </label>
                <label class="col">password
                    <input type="text" name="mqtt_pass">
                </label>
            </div>
            <div class="row">
                <label class="col">Base topic
                    <input type="text" name="mqtt_topic" required>
                </label>
            </div>
        </fieldset>
        <button type="submit" id="submit">Save</button>
    </form>
    <script>
        document.addEventListener("DOMContentLoaded", async function () {
            // pre-fill input fields from config
            const config = await fetch('/config.json').then(response => response.json());
            Object.entries(config).forEach(([name, value]) => {
                const element = document.querySelector("[name='" + name + "']");
                if (element) {
                    element.value = value;
                }
            })
        });

        // disable submit button on POST, it will be re-enabled on the reload
        document.getElementById("config").addEventListener("submit", function (e) {
            document.getElementById("submit").disabled = true
        });
    </script>
</body>

</html>
